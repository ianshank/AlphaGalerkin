version: 2
updates:
  # Python dependencies declared in pyproject.toml
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    # These are intentionally pinned; a bump would break CI gates or an
    # un-migrated backend. Do not let Dependabot fight the pins.
    ignore:
      # ruff is dual-pinned in pyproject.toml AND .github/workflows/ci.yml
      # (a newer ruff reformats Markdown and breaks the format gate).
      - dependency-name: "ruff"
      # The JAX/flax stack is pinned to the last mutually-compatible set
      # until src/backend/jax_backend.py is migrated (see pyproject.toml).
      - dependency-name: "jax"
      - dependency-name: "jaxlib"
      - dependency-name: "flax"
      - dependency-name: "optax"
      - dependency-name: "orbax-checkpoint"
      - dependency-name: "chex"
      # Pinned to align with the lint step / avoid 2.10+ behavioural changes.
      - dependency-name: "pydantic"
      - dependency-name: "mypy"

  # GitHub Actions used by the workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
