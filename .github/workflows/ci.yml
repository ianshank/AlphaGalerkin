# AlphaGalerkin CI/CD Pipeline
# Comprehensive testing, linting, and type checking workflow
#
# Stages:
# 1. Lint & Type Check - Code quality validation
# 2. Unit Tests (Fast) - Core functionality without slow/e2e tests
# 3. Unit Tests (Slow) - Long-running tests
# 4. Integration Tests - End-to-end workflow validation
# 5. Coverage Report - Test coverage aggregation with 85% gate

name: CI

on:
  push:
    branches: [main, develop, "feature/*", "claude/*"]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 4 * * *'  # Run nightly at 4am UTC
  workflow_dispatch:

# Cancel in-progress runs on new pushes to same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_WARN_SCRIPT_LOCATION: "1"
  # Langfuse credentials are intentionally unset in CI; the tracker
  # degrades to a no-op when LANGFUSE_PUBLIC_KEY / LANGFUSE_SECRET_KEY
  # are absent, so no API keys are required.
  # Set matplotlib to non-interactive backend
  MPLBACKEND: Agg
  # Reproducible builds
  PYTHONHASHSEED: "0"

jobs:
  # ============================================================
  # Stage 1: Lint & Type Check
  # ============================================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          # Pin mypy + pydantic for plugin compatibility
          pip install "mypy>=1.10,<1.12" "pydantic>=2.7,<2.10"
          # Install minimal deps for type checking
          pip install torch einops jaxtyping hydra-core structlog numpy scipy

      - name: Run Ruff linting
        run: ruff check src/ tests/ --output-format=github

      - name: Run Ruff formatting check
        run: ruff format src/ tests/ --check

      - name: Run MyPy type checking
        # Informational: pre-existing codebase has type errors in video_compression/,
        # distributed/, modeling/ that require incremental refactoring.
        # Ruff check + format are the hard quality gates.
        # Track progress: mypy errors should decrease over time.
        continue-on-error: true
        run: mypy src/ --strict --ignore-missing-imports

  # ============================================================
  # Stage 2: Unit Tests (Fast)
  # ============================================================
  test-fast:
    name: Unit Tests (Fast)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -e ".[dev]" || pip install --no-cache-dir -e ".[dev]"
          # Safety-net: ensure core scientific/ML deps are present even if
          # the editable install partially failed (can happen with complex
          # dependency graphs on older pip resolvers).
          python -c "import einops, jaxtyping, gradio" 2>/dev/null || \
            pip install --no-cache-dir "einops>=0.7.0" "jaxtyping>=0.2.25" "gradio>=6.0.0"

      - name: Show installed package versions
        run: |
          python -c "import sys; print('Python', sys.version)"
          pip list --format=columns | grep -E "gradio|anyio|pydantic|hypothesis|torch|numpy|scipy|Pillow|einops|jaxtyping|matplotlib"

      - name: Run fast unit tests
        run: |
          pytest tests/ \
            -m "not slow and not e2e and not video and not gpu_required" \
            --tb=short \
            --ignore=tests/e2e/ \
            --ignore=tests/integration/ \
            --ignore=tests/demos/ \
            --ignore=tests/video_compression/ \
            --ignore=tests/training/test_extended_config.py \
            --ignore=tests/notebooks/ \
            --ignore=tests/vertex/ \
            --ignore=tests/distributed/test_multiprocess.py \
            --ignore=tests/pde/test_mcts_adapter.py \
            --deselect=tests/data/test_dataset.py::TestReplayDataset::test_iteration_with_dataloader \
            --deselect=tests/data/test_dataset.py::TestExperienceListDataset::test_with_dataloader \
            --deselect=tests/data/test_dataset.py::TestDatasetIntegration::test_batch_sampler_with_list_dataset \
            --deselect=tests/experiments/test_physics_loss.py::TestPhysicsLossComputeLaplacian::test_laplacian_of_linear \
            --deselect=tests/games/test_chess.py::TestChessEdgeCases::test_invalid_move_notation \
            --deselect=tests/games/test_chess.py::TestChessEdgeCases::test_illegal_move_notation \
            --deselect=tests/mcts/test_node.py::TestPruneExcept::test_prune_except_returns_child \
            --deselect=tests/mcts/test_search.py::TestMCTSTreeManagement::test_advance_reuses_subtree \
            --deselect=tests/training/test_self_play.py::TestParallelSelfPlayWorker::test_sequential_fallback_cuda_device \
            --deselect=tests/training/test_self_play.py::TestParallelSelfPlayWorker::test_sequential_fallback_cuda_torch_device \
            --deselect=tests/training/test_self_play.py::TestParallelSelfPlayWorker::test_generate_games_sequential_fallback_on_error \
            -q 2>&1 | tee /tmp/pytest-output.txt; exit ${PIPESTATUS[0]}

      - name: Upload pytest output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output-py${{ matrix.python-version }}
          path: /tmp/pytest-output.txt
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-fast-py${{ matrix.python-version }}
          path: |
            .pytest_cache/
          retention-days: 7

  # ============================================================
  # Stage 3: Unit Tests (Slow) - Only on main/develop or explicit
  # ============================================================
  test-slow:
    name: Unit Tests (Slow)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: test-fast
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || contains(github.event.head_commit.message, '[full-test]') || github.event_name == 'schedule'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run slow unit tests
        run: |
          pytest tests/ \
            -m "slow and not gpu_required" \
            --tb=short \
            -x \
            -q

  # ============================================================
  # Stage 4: Integration Tests
  # ============================================================
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test-fast

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration tests
        run: |
          pytest tests/integration/ tests/training/ \
            -m "not gpu_required" \
            --tb=short \
            -q

  # ============================================================
  # Stage 5: Coverage Report (85% global gate)
  # ============================================================
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-cov matplotlib

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            -m "not slow and not e2e and not video and not gpu_required" \
            --ignore=tests/e2e/ \
            --ignore=tests/integration/ \
            --ignore=tests/demos/ \
            --ignore=tests/video_compression/ \
            --ignore=tests/training/test_extended_config.py \
            --ignore=tests/notebooks/ \
            --ignore=tests/vertex/ \
            --ignore=tests/distributed/test_multiprocess.py \
            --ignore=tests/pde/test_mcts_adapter.py \
            --deselect=tests/data/test_dataset.py::TestReplayDataset::test_iteration_with_dataloader \
            --deselect=tests/data/test_dataset.py::TestExperienceListDataset::test_with_dataloader \
            --deselect=tests/data/test_dataset.py::TestDatasetIntegration::test_batch_sampler_with_list_dataset \
            --deselect=tests/experiments/test_physics_loss.py::TestPhysicsLossComputeLaplacian::test_laplacian_of_linear \
            --deselect=tests/games/test_chess.py::TestChessEdgeCases::test_invalid_move_notation \
            --deselect=tests/games/test_chess.py::TestChessEdgeCases::test_illegal_move_notation \
            --deselect=tests/mcts/test_node.py::TestPruneExcept::test_prune_except_returns_child \
            --deselect=tests/mcts/test_search.py::TestMCTSTreeManagement::test_advance_reuses_subtree \
            --deselect=tests/training/test_self_play.py::TestParallelSelfPlayWorker::test_sequential_fallback_cuda_device \
            --deselect=tests/training/test_self_play.py::TestParallelSelfPlayWorker::test_sequential_fallback_cuda_torch_device \
            --deselect=tests/training/test_self_play.py::TestParallelSelfPlayWorker::test_generate_games_sequential_fallback_on_error \
            --cov=src \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --cov-fail-under=85 \
            -q

      # Per-module coverage gates — ratcheted up as part of tech-debt reduction.
      # Each gate ensures no single subsystem regresses below its threshold.
      - name: Per-module coverage gate (pde)
        if: always() && hashFiles('tests/pde/') != ''
        run: |
          pytest tests/pde/ --cov=src/pde --cov-fail-under=75 -q --no-header

      - name: Per-module coverage gate (modeling)
        if: always() && hashFiles('tests/modeling/') != ''
        run: |
          pytest tests/modeling/ --cov=src/modeling --cov-fail-under=85 -q --no-header

      - name: Per-module coverage gate (training)
        if: always() && hashFiles('tests/training/') != ''
        run: |
          pytest tests/training/ --cov=src/training --cov-fail-under=85 -q --no-header

      - name: Per-module coverage gate (research)
        if: always() && hashFiles('tests/research/') != ''
        run: |
          pytest tests/research/ --cov=src/research --cov-fail-under=85 -q --no-header

      - name: Per-module coverage gate (games)
        if: always() && hashFiles('tests/games/') != ''
        run: |
          pytest tests/games/ --cov=src/games --cov-fail-under=80 -q --no-header

      - name: Per-module coverage gate (distributed)
        if: always() && hashFiles('tests/distributed/') != ''
        run: |
          pytest tests/distributed/ --cov=src/distributed --cov-fail-under=60 -q --no-header

      - name: Per-module coverage gate (physics)
        if: always() && hashFiles('tests/physics/') != ''
        run: |
          pytest tests/physics/ --cov=src/physics --cov-fail-under=75 -q --no-header

      - name: Per-module coverage gate (reentry)
        if: hashFiles('tests/reentry/') != ''
        run: |
          pytest tests/reentry/ --cov=src/reentry --cov-fail-under=60 -q --no-header

      - name: Per-module coverage gate (firefighting)
        if: hashFiles('tests/firefighting/') != ''
        run: |
          pytest tests/firefighting/ --cov=src/firefighting --cov-fail-under=60 -q --no-header

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-alphagalerkin
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 14

  # ============================================================
  # Stage 6: JAX Backend Tests
  # ============================================================
  test-jax:
    name: JAX Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,jax]"

      - name: Run JAX-specific tests
        run: |
          pytest tests/backend/ \
            --tb=short \
            -q

      - name: Run cross-backend tests
        run: |
          pytest tests/ \
            -m "cross_backend" \
            --tb=short \
            -q

  # ============================================================
  # Stage 7: Video Compression Tests (Optional - requires more resources)
  # ============================================================
  test-video:
    name: Video Compression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: test-fast
    if: contains(github.event.head_commit.message, '[video-test]') || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run video compression tests
        run: |
          pytest tests/video_compression/ \
            -m "not gpu_required" \
            --tb=short \
            -q

  # ============================================================
  # Stage 8: Chess Pipeline Tests
  # ============================================================
  test-chess:
    name: Chess Pipeline Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-cov

      - name: Run chess unit tests
        run: |
          pytest tests/games/test_chess.py tests/games/test_chess_exhaustive.py \
            tests/games/test_wrapper.py tests/modeling/test_chess_model.py \
            tests/training/test_chess_self_play.py \
            tests/training/test_trainer_chess.py \
            tests/security/test_chess_security.py \
            --cov=src/games \
            --cov-config=.github/chess-coveragerc \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            --tb=short \
            -v

      - name: Run chess E2E smoke tests
        run: |
          pytest tests/e2e/test_chess_training_e2e.py \
            --tb=short \
            -v

  # ============================================================
  # Performance Benchmark
  # ============================================================
  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test-fast
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run performance benchmarks
        run: |
          pytest tests/ -m "benchmark" --tb=short -q || true
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark_results/
          retention-days: 30

  # ============================================================
  # Final Status Check
  # ============================================================
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint, test-fast, coverage]
    if: always()

    steps:
      - name: Check required jobs passed
        run: |
          echo "=== CI Gate Results ==="
          echo "  lint:      ${{ needs.lint.result }}"
          echo "  test-fast: ${{ needs.test-fast.result }}"
          echo "  coverage:  ${{ needs.coverage.result }}"
          echo "======================="

          # Required gates: lint must pass
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "FAIL: Lint & Type Check failed (result=${{ needs.lint.result }})"
            exit 1
          fi

          # test-fast must pass
          if [[ "${{ needs.test-fast.result }}" != "success" ]]; then
            echo "FAIL: Unit tests failed (result=${{ needs.test-fast.result }})"
            exit 1
          fi

          # Coverage gate is a hard threshold (--cov-fail-under=85)
          if [[ "${{ needs.coverage.result }}" != "success" ]]; then
            echo "FAIL: Coverage gate did not pass (result=${{ needs.coverage.result }})"
            exit 1
          fi

          echo "All core CI gates passed"
