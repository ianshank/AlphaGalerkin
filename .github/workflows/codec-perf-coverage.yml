# AlphaGalerkin Codec Perf Coverage Gate
#
# Locks in the >= 85% per-module coverage floor for the codec performance
# benchmark harness (`src/video_compression/perf/`). Phase 0 of the self-
# hosted neural transcoder roadmap; the coverage on this surface gates
# every later phase (Phase 1 runtime backends, Phase 2 model zoo,
# Phase 3 MCTS rate control, Phase 4+ daemon / plugins).
#
# Why a dedicated workflow rather than folding into ci.yml:
#   - ci.yml's fast unit-test pass currently `--ignore=tests/video_compression/`
#     (see line 128 of ci.yml on master). Folding the codec-perf gate into
#     ci.yml would require either un-ignoring that whole tree (out of scope
#     for this PR) or wiring a second ci.yml stage. A focused workflow is
#     simpler and the right scope for Phase 0.
#   - When the integration branch syncs with master and gains
#     ``regression-surface.yml``, this workflow can be merged into it as
#     an additional ``codec-perf-coverage-gate`` job following the same
#     inline-coveragerc pattern. Keep both forms compatible.

name: Codec Perf Coverage Gate

on:
  push:
    branches: [master, "claude/*", "feature/*", develop]
    paths:
      - "src/video_compression/perf/**"
      - "tests/video_compression/perf/**"
      - "config/perf/**"
      - "scripts/benchmark_codec.py"
      - ".github/workflows/codec-perf-coverage.yml"
      - "pyproject.toml"
  pull_request:
    branches: [master, develop, "claude/alphagalerkin-implementation-*"]
    paths:
      - "src/video_compression/perf/**"
      - "tests/video_compression/perf/**"
      - "config/perf/**"
      - "scripts/benchmark_codec.py"
      - ".github/workflows/codec-perf-coverage.yml"
      - "pyproject.toml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  WANDB_MODE: disabled
  MPLBACKEND: Agg
  PYTHONHASHSEED: "0"

jobs:
  codec-perf-coverage-gate:
    name: Codec Perf per-module coverage (>= 85%)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -e ".[dev]" || pip install --no-cache-dir -e ".[dev]"

      - name: Run codec perf coverage gate
        # Why an inline coveragerc with `include = ...` rather than
        # per-file `--cov=...` args: pytest-cov's `--cov` flag treats each
        # value as a package or directory. File paths like
        # `--cov=src/video_compression/perf/benchmark` (no .py) are matched
        # as packages and produce "Module ... was never imported" warnings,
        # collapsing the recorded coverage to 0%. The documented way to
        # scope coverage to a specific file list is the `[run] include`
        # config option, which accepts glob patterns. Same pattern proven
        # in master's regression-surface.yml::noyron-hx-coverage-gate.
        #
        # Current achieved coverage on master/integration after PR #75 +
        # this follow-up: __init__.py 100% / baseline.py 99% /
        # benchmark.py 98% / config.py 96% / device.py 90% /
        # metrics.py 100% / subjects.py 97% — TOTAL 98%.
        # Gate at 85% is a hard floor; promote to 95% if the achieved
        # number stays above for a full release cycle.
        run: |
          cat > .coveragerc.codec-perf <<'COVEOF'
          [run]
          include =
              src/video_compression/perf/*.py
          branch = true

          [report]
          show_missing = true
          fail_under = 85
          COVEOF
          pytest tests/video_compression/perf/ \
                 --cov \
                 --cov-config=.coveragerc.codec-perf \
                 --cov-report=term-missing \
                 -q --tb=short

      - name: Upload coverage report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: codec-perf-coverage-failure
          path: |
            .coverage
            htmlcov/
          retention-days: 7
          if-no-files-found: ignore
