name: Docs

# Builds the MkDocs site and deploys it to GitHub Pages. Kept separate from
# ci.yml so a docs failure never blocks the test/coverage pipeline.
#
# One-time manual setup: repo Settings -> Pages -> Source = "GitHub Actions".

# The build job runs on any branch push that touches docs/site sources (a useful
# validation), but the deploy job below is gated to the repository's default
# branch by name, so Pages only ever publishes from the default branch. A
# hardcoded `branches: [main]` filter would never fire in a repo whose default
# branch is not literally "main".
on:
  push:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "src/**"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install docs toolchain
        run: pip install -e '.[docs]'
      - name: Check internal doc links
        run: python scripts/check_doc_links.py
      - name: Build (strict)
        run: mkdocs build --strict
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: Deploy to Pages
    needs: build
    # Publish only from the default branch (name-agnostic) or a manual dispatch.
    if: github.event_name == 'workflow_dispatch' || github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
