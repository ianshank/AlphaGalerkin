# Centaur Research-Loop Harness — CPU-only smoke configuration.
#
# Drives the MCTS + evaluator solver across an OOD PDE manifest
# (poisson / helmholtz / biharmonic) on the random arm only, with no CUDA
# and no LM Studio server. This is the CPU-runnable counterpart to
# research_loop_demo.yaml: it proves the discovery-ledger aggregation runs
# end-to-end across the held-out operators, and is safe for CI / a laptop.
#
# Run with:
#   python -m src.agents.cli research --config config/agents/research_loop_cpu.yaml
#
# For the headline run (trained / LLM arms) use research_loop_demo.yaml on a
# CUDA host with LM Studio serving Qwen-14B.

name: research_loop_cpu
description: "CPU smoke: sweep the random arm across an OOD PDE manifest and rank per problem."
agent_type: research

# Problem manifest — held-out OOD operators alongside the in-distribution one.
problems:
  - name: poisson_id
    pde: poisson
  - name: helmholtz_ood
    pde: helmholtz
  - name: biharmonic_ood
    pde: biharmonic

# Random arm only on the CPU path.
default_arms: [random]

# Seeds + solve budget — kept small for a fast CPU smoke.
n_seeds: 3
n_mcts_simulations: 16
max_rollouts: 256
target_residual: 1.0e-2
max_basis_functions: 12
n_candidate_bases: 24

# No trained checkpoint on the CPU path.
trained_checkpoint_path: null

# Device + execution — force CPU.
device: cpu
parallel: false

# Acceptance — fraction of problems whose best arm must reach target_residual.
min_solved_fraction: 0.5

# LM Studio sub-config disabled — the LLM arm is not used on CPU.
lm_studio:
  enabled: false
