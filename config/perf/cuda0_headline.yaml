# Headline GPU benchmark on the primary card only (cuda:0).
#
# Use this for the realtime-decode gating decision: a single-card,
# single-resolution-pass measurement on the RTX 5060 Ti 16 GB. The
# duals-card sweep (config/perf/default.yaml) takes longer but produces
# directly-comparable cuda:0 vs cuda:1 numbers.
#
# Run with:
#   python -m scripts.benchmark_codec run \
#       --config config/perf/cuda0_headline.yaml \
#       --output reports/headline_$(git rev-parse --short HEAD).json

name: perf_cuda0_headline
description: "Single-card headline benchmark on cuda:0 (5060 Ti 16 GB)"

resolutions:
  - name: r720p
    label: "720p"
    height: 720
    width: 1280
  - name: r1080p
    label: "1080p"
    height: 1088
    width: 1920
  - name: r2160p
    label: "2160p"
    height: 2160
    width: 3840

batch_sizes: [1]

runtime_profiles:
  - name: cuda0_fp32
    backend: pytorch
    precision: fp32
    device: "cuda:0"

phases: [forward]

n_warmup: 10
n_repeats: 50
n_frames_per_iter: 1

device_preference: "cuda:0"
track_gpu_memory: true

pattern: motion
data_seed: 20260427

regression_tolerance_pct: 5.0
fail_fast: false

codec:
  name: codec_headline
  encoder:
    name: encoder_headline
    in_channels: 3
    latent_channels: 192
    n_layers: 4
    d_model: 256
    n_heads: 8
    d_ffn: 1024
    downsample_factor: 16
  decoder:
    name: decoder_headline
    latent_channels: 192
    out_channels: 3
    n_layers: 4
    d_model: 256
    n_heads: 8
    d_ffn: 1024
    upsample_factor: 16
  quantizer:
    name: quantizer_headline
  entropy:
    name: entropy_headline
    hyper_channels: 192
    num_filters: 192
  mcts:
    name: mcts_headline
  training:
    name: training_headline
