# Smoke benchmark — runs in <30 s on CPU. This is the CI-only path: it
# explicitly forces ``device_preference: cpu`` so it can run on machines
# without CUDA. For headline numbers on the user's hardware, see:
#   * config/perf/cuda0_headline.yaml — single-card on the 16 GB GPU
#   * config/perf/default.yaml         — dual-card sweep
#
# The smoke config exists to verify the harness wiring, not to produce
# meaningful throughput numbers. All measurement-affecting fields are
# explicit; the resolutions are intentionally tiny so codec init cost
# dominates and the headline regression we gate on is "did the harness
# explode?", not "is throughput stable?".

name: perf_smoke
description: "CPU-only smoke benchmark for CI"

resolutions:
  - name: r64
    label: "64x64"
    height: 64
    width: 64
  - name: r128
    label: "128x128"
    height: 128
    width: 128

batch_sizes: [1]

runtime_profiles:
  - name: pytorch_fp32
    backend: pytorch
    precision: fp32
    compile_mode: default

phases: [forward]

n_warmup: 1
n_repeats: 3
n_frames_per_iter: 1

device_preference: cpu
track_gpu_memory: false

pattern: motion
data_seed: 20260427

regression_tolerance_pct: 25.0   # CI machines are noisy; loose gate
fail_fast: false

# Embedded codec config: smallest values still allowed by codec field
# constraints (latent_channels >= 32, d_model >= 64, d_ffn >= 128).
codec:
  name: codec_smoke
  encoder:
    name: encoder_smoke
    in_channels: 3
    latent_channels: 32
    n_layers: 1
    d_model: 64
    n_heads: 4
    d_ffn: 128
    downsample_factor: 16
  decoder:
    name: decoder_smoke
    latent_channels: 32
    out_channels: 3
    n_layers: 1
    d_model: 64
    n_heads: 4
    d_ffn: 128
    upsample_factor: 16
  quantizer:
    name: quantizer_smoke
  entropy:
    name: entropy_smoke
    hyper_channels: 32
    num_filters: 32
  mcts:
    name: mcts_smoke
    num_simulations: 4
    state_dim: 64
  training:
    name: training_smoke
