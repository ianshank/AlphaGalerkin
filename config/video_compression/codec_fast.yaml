# Fast Video Codec Configuration
# AlphaGalerkin Neural Video Compression
#
# Usage:
#   python -m scripts.encode_video --config codec_fast.yaml
#
# This preset optimizes for encoding speed over quality.
# Suitable for real-time or interactive applications.

name: "fast"

encoder:
  name: "encoder_fast"
  in_channels: 3
  latent_channels: 128
  n_layers: 2
  d_model: 128
  n_heads: 4
  d_ffn: 512
  use_fnet_mixing: true  # FNet is faster than attention
  fnet_ratio: 0.8  # More FNet, less Galerkin
  normalize_features: true
  dropout: 0.0  # No dropout for speed
  downsample_factor: 16

decoder:
  name: "decoder_fast"
  latent_channels: 128
  out_channels: 3
  n_layers: 2
  d_model: 128
  n_heads: 4
  d_ffn: 512
  use_fnet_mixing: true
  fnet_ratio: 0.8
  normalize_features: true
  dropout: 0.0
  upsample_factor: 16

quantizer:
  name: "quantizer_fast"
  mode: "ste"  # STE is faster than soft
  temperature: 1.0
  temperature_annealing: false
  min_temperature: 1.0
  noise_scale: 0.5

entropy:
  name: "entropy_fast"
  model_type: "hyperprior"
  hyper_channels: 128
  hyper_layers: 2
  num_filters: 128
  context_size: 3
  use_range_coder: true

mcts:
  name: "mcts_fast"
  # Fewer MCTS simulations for speed
  num_simulations: 10
  c_puct: 1.25
  dirichlet_alpha: 0.3
  dirichlet_epsilon: 0.25
  temperature: 0.5  # More greedy
  discount: 0.99
  value_support_size: 31

  # Smaller GOP for lower latency
  gop_size: 8
  i_frame_interval: 8
  use_b_frames: false  # B-frames add latency
  b_frame_count: 0

  # Rate control
  rate_control_mode: "crf"
  target_bitrate_kbps: 3000.0
  crf_value: 26  # Slightly lower quality for speed
  bitrate_tolerance: 0.2
  qp_min: 10
  qp_max: 45

training:
  name: "training_fast"
  learning_rate: 0.0002
  weight_decay: 0.0001
  lambda_rd: 0.02
  lambda_values:
    - 0.01
    - 0.02
    - 0.04
    - 0.08
  distortion_metric: "mse"  # MSE is faster than MS-SSIM
  ms_ssim_weight: 0.0
  use_perceptual_loss: false  # Skip perceptual for speed
  perceptual_weight: 0.0
  patch_size: 192
  variable_resolution: false  # Fixed resolution for speed
  min_resolution: 192
  max_resolution: 192
  vmaf_min: 60.0
