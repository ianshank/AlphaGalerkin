# Default 8-point lambda grid for the AlphaGalerkin video-codec model zoo.
#
# Lambda values mirror src/video_compression/config.py::TrainingConfig
# default ``lambda_values`` list verbatim. Targets are placeholders
# refined per Phase F (BD-rate validation) and may be overridden per
# entry without touching this file (use a separate manifest).
#
# Estimated VRAM is set to keep the largest entries (low lambda, high
# quality) on cuda:0 (16 GiB headline) and lighter entries on cuda:1
# (8 GiB) when the dual-GPU rig is detected.

name: alphagalerkin_codec_zoo_v1
description: Phase 2 8-point R-D grid for the AlphaGalerkin video codec.
schema_version: 1

storage_backend: filesystem
storage_root: checkpoints/video_compression/zoo

device_assignment_strategy: vram_aware
device_preference: cuda
parallel_workers_per_device: 1
fail_fast: false

default_codec_config_ref: config/video_compression/codec_default.yaml
default_train_dataset_ref: null

entries:
  - entry_id: lambda_0016
    lambda_rd: 0.0016
    distortion_metric: mixed
    target_bpp: 0.10
    target_psnr_db: 28.0
    train_steps: 200000
    batch_size: 8
    estimated_vram_mib: 12000.0  # → cuda:0
    seed: 20260501

