# Experimental training config with full evaluation
# Use with: python -m scripts.train --config-name=train_experiment

defaults:
  - train_fast
  - _self_

# Extended training for meaningful evaluation
training:
  total_steps: 500
  eval_interval: 100
  checkpoint_interval: 100
  eval_games: 10
  n_self_play_games: 10

  # Enable evaluation features
  eval_vs_checkpoints: true
  elo_k_factor: 32.0
  n_tournament_opponents: 3
  multi_resolution_eval: true

  # Enable stability monitoring
  early_stopping_enabled: true
  early_stopping_patience: 3
  early_stopping_min_delta: 0.01
  plateau_detection_enabled: true
  plateau_patience: 2
  plateau_factor: 0.5
  plateau_min_lr: 1e-6

  # Enable curriculum
  curriculum_enabled: true

# Enable W&B logging
wandb:
  enabled: true
  project: alphagalerkin
  mode: online
  tags:
    - experiment
    - small-run
  log_model: true
  log_code: true

# Use GPU if available
device: auto

# Progressive board sizes
board_sizes:
  - 9
  - 13

experiment_name: training_experiment
log_level: INFO
